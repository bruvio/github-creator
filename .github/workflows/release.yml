name: CI/CD Pipeline

# ┌──────────────────────────────────────────────────────────────────────┐
# │  PR:                                                                │
# │    terraform-fmt ──┐                                                │
# │                    ├──> (done)                                      │
# │    ruff ───────────┘                                                │
# │                                                                     │
# │  Push to master:                                                    │
# │    terraform-fmt ──┐                                                │
# │                    ├──> semver ──> (release tag)                    │
# │    ruff ───────────┘                                                │
# └──────────────────────────────────────────────────────────────────────┘

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  # ── Stage 1: Linting & Validation (all triggers) ──
  terraform-fmt:
    name: Terraform Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Format Check
        run: terraform fmt -check -recursive

  ruff:
    name: Python Lint & Format (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Ruff
        run: pip install ruff
      - name: Lint
        run: ruff check .
      - name: Format Check
        run: ruff format --check .

  # ── Stage 2: Semantic Release (master push only) ──
  semver:
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      !contains(github.event.head_commit.message, '[skip ci]')
    needs: [terraform-fmt, ruff]
    uses: ./.github/workflows/ci-semver.yml
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
